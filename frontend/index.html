<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=240, height=240, initial-scale=1, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="carousel">

        <section class="screen active" data-screen="clock">
          <div class="greeting" id="greeting">Hello</div>
          <div class="clock-time" id="clock">--:--</div>
          <div class="clock-date" id="date">—</div>
          <div class="mkstatus" id="mkstatus"></div>
        </section>

        <section class="screen" data-screen="markets">
          <h2 class="screen-title">Markets</h2>
          <div class="market-list" id="market-list"></div>
        </section>

        <section class="screen" data-screen="dolar">
          <h2 class="screen-title">Dólar <span class="cur">ARS</span></h2>
          <div class="dolar-grid" id="dolar-grid"></div>
        </section>

        <section class="screen" data-screen="weather">
          <h2 class="screen-title" id="weather-title">Buenos Aires</h2>
          <div class="w-temp" id="w-temp">—°</div>
          <div class="w-meta" id="w-meta">loading…</div>
          <div class="w-week" id="weather-week"></div>
        </section>

        <section class="screen" data-screen="news">
          <div class="featured-head">
            <span class="dot live"></span>
            <span class="kicker">Live News</span>
          </div>
          <h3 id="featured-title">Loading…</h3>
          <p class="featured-domain" id="featured-domain"></p>
        </section>

      </div>

      <div class="pager" id="pager">
        <span class="pd on"></span>
        <span class="pd"></span>
        <span class="pd"></span>
        <span class="pd"></span>
        <span class="pd"></span>
      </div>
    </div>

    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
      (function () {
        function start() {
          try {
            if (window.cast && cast.framework) {
              cast.framework.CastReceiverContext.getInstance()
                .start({ disableIdleTimeout: true });
            }
          } catch (e) { console.warn("cast receiver start failed", e); }
        }
        if (window.cast && cast.framework) start();
        else window.addEventListener("load", start);
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
