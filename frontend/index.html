<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Nest Dashboard</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="globe-canvas"></canvas>

      <div class="vignette"></div>

      <aside class="panel col-left">
        <header class="clock-block">
          <div class="clock" id="clock">--:--</div>
          <div class="date" id="date">—</div>
        </header>

        <section class="card markets" id="markets-card">
          <h2>Markets</h2>
          <div class="market-list" id="market-list"></div>
        </section>
      </aside>

      <aside class="panel col-right">
        <section class="card featured" id="featured">
          <div class="featured-head">
            <span class="dot live"></span>
            <span class="kicker">LIVE NEWS</span>
          </div>
          <h3 id="featured-title">Loading…</h3>
          <p class="featured-domain" id="featured-domain"></p>
        </section>

        <section class="card calendar">
          <h2 id="cal-title">—</h2>
          <div class="cal-grid" id="cal-grid"></div>
        </section>
      </aside>

      <footer class="ticker">
        <div class="ticker-track" id="ticker"></div>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
