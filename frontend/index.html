<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Nest Dashboard</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <aside class="panel col-left">
        <header class="clock-block">
          <div class="greeting" id="greeting">Hello</div>
          <div class="clock" id="clock">--:--</div>
          <div class="date" id="date">—</div>
          <div class="mkstatus" id="mkstatus"></div>
        </header>

        <section class="card markets" id="markets-card">
          <h2>Markets</h2>
          <div class="market-list" id="market-list"></div>
        </section>

        <section class="card dolar" id="dolar-card">
          <h2>Dólar (ARS)</h2>
          <div class="dolar-grid" id="dolar-grid"></div>
        </section>
      </aside>

      <main class="col-center">
        <section class="card map-card">
          <div class="map-head">
            <span class="dot live"></span>
            <span class="kicker">LIVE WORLD</span>
            <span class="map-count" id="map-count"></span>
          </div>
          <canvas id="map-canvas"></canvas>
        </section>
      </main>

      <aside class="panel col-right">
        <section class="card weather" id="weather-card">
          <h2>Buenos Aires</h2>
          <div class="w-current">
            <div class="w-temp" id="w-temp">—°</div>
            <div class="w-meta" id="w-meta">loading…</div>
          </div>
          <div class="w-week" id="weather-week"></div>
        </section>

        <section class="card featured" id="featured">
          <div class="featured-head">
            <span class="dot live"></span>
            <span class="kicker">LIVE NEWS</span>
          </div>
          <h3 id="featured-title">Loading…</h3>
          <p class="featured-domain" id="featured-domain"></p>
        </section>

        <section class="card calendar">
          <h2 id="cal-title">—</h2>
          <div class="cal-grid" id="cal-grid"></div>
        </section>
      </aside>

      <footer class="ticker">
        <div class="ticker-track" id="ticker"></div>
      </footer>
    </div>

    <script src="https://www.gstatic.com/cast/sdk/receiver/cast_receiver_framework.js"></script>
    <script>
      (function () {
        function start() {
          try {
            if (window.cast && cast.framework) {
              cast.framework.CastReceiverContext.getInstance()
                .start({ disableIdleTimeout: true });
            }
          } catch (e) { console.warn("cast receiver start failed", e); }
        }
        if (window.cast && cast.framework) start();
        else window.addEventListener("load", start);
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
